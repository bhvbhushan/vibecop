name: 'vibecop PR Gate'
description: 'AI code quality linter — scans PR changes for AI-generated code antipatterns'
author: 'bhvbhushan'

inputs:
  github-token:
    description: 'GitHub token for API access (PR comments, reviews)'
    required: false
    default: '${{ github.token }}'
  config:
    description: 'Path to .vibecop.yml config file'
    required: false
    default: '.vibecop.yml'
  on-failure:
    description: 'Action on findings: comment-only, request-changes, label, auto-close'
    required: false
    default: 'comment-only'
  label:
    description: 'Label to apply when on-failure is "label"'
    required: false
    default: 'vibecop:needs-review'
  max-findings:
    description: 'Maximum findings to report (0 = unlimited)'
    required: false
    default: '50'
  severity-threshold:
    description: 'Minimum severity to post inline comments for (error, warning, info)'
    required: false
    default: 'warning'
  working-directory:
    description: 'Directory to scan (relative to repo root)'
    required: false
    default: '.'

outputs:
  findings-count:
    description: 'Total number of findings'
  errors-count:
    description: 'Number of error-severity findings'
  warnings-count:
    description: 'Number of warning-severity findings'
  has-findings:
    description: 'Whether any findings were detected (true/false)'
  scan-time-ms:
    description: 'Scan duration in milliseconds'

runs:
  using: 'node20'
  main: 'dist/action/index.js'
