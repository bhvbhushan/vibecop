ignore:
  - "**/node_modules/**"
  - "**/dist/**"
  - "test/fixtures/**"
  - "**/*.d.ts"
  - "bun.lock"

rules:
  excessive-comment-ratio:
    threshold: 0.6

  # Detector code is inherently complex (AST traversal) — default thresholds are too strict
  god-function:
    severity: warning

  # Detector code contains the string patterns it detects — these self-matches are not bugs
  n-plus-one-query:
    severity: warning
  placeholder-in-production:
    severity: warning
