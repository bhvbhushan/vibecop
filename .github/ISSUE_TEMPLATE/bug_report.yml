name: Bug Report
description: Report a bug in vibecop
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run `vibecop ...`
        2. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: input
    id: detector-id
    attributes:
      label: Detector ID
      description: If applicable, which detector is affected?
      placeholder: e.g., "god-function", "sql-injection"
    validations:
      required: false

  - type: dropdown
    id: operating-system
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true

  - type: input
    id: node-bun-version
    attributes:
      label: Node.js/Bun Version
      placeholder: e.g., "Bun 1.1.0" or "Node 20.11.0"
    validations:
      required: true

  - type: input
    id: vibecop-version
    attributes:
      label: vibecop Version
      placeholder: e.g., "0.1.0"
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or logs.
    validations:
      required: false
