name: Feature Request
description: Suggest a new feature or improvement for vibecop
labels: ["enhancement"]
body:
  - type: textarea
    id: problem-or-motivation
    attributes:
      label: Problem or Motivation
      description: What problem does this feature solve, or what is the motivation behind it?
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like.
    validations:
      required: true

  - type: textarea
    id: alternatives-considered
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or features you've considered.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context, mockups, or references.
    validations:
      required: false
